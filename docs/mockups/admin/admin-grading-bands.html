<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading Bands | OS/SCHOOL Admin</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Clean Professional Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                        },
                        brand: {
                            primary: '#2563eb', // Clean operational blue
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }

        .band-input {
            width: 70px;
            height: 40px;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            text-align: center;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            outline: none;
            transition: all 0.2s;
        }

        .band-input:focus {
            border-color: #2563eb;
            background-color: #eff6ff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .error-border {
            border-color: #ef4444;
            background-color: #fef2f2;
        }

        th {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            padding: 1rem;
            border-bottom: 2px solid #f1f5f9;
            background: #f8fafc;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            background: white;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        /* Responsive UI Overrides */
        @media (max-width: 640px) {
            .mobile-header-stack {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .mobile-full-width-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- MOBILE-OPTIMIZED HEADER -->
    <header class="bg-white border-b border-slate-200 py-4 px-4 sm:px-8 sticky top-0 z-50 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button class="w-8 h-8 flex items-center justify-center text-slate-500 lg:hidden">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-slate-900 rounded-md flex items-center justify-center text-white font-bold text-[10px]">OS</div>
                <span class="font-extrabold text-[12px] tracking-tight text-slate-900 hidden sm:inline uppercase">Grading Bands</span>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
             <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-[10px] text-slate-600 border border-slate-200">
                AD
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto py-6 sm:py-10 px-4 sm:px-6 space-y-6 sm:space-y-8">
        
        <!-- HEADER -->
        <div class="space-y-4">
            <div class="flex items-center gap-2 text-[8px] font-extrabold text-slate-400 uppercase tracking-widest">
                <a href="#">Admin</a>
                <i data-lucide="chevron-right" class="w-3 h-3 text-slate-300"></i>
                <span class="text-slate-900 uppercase">Threshold Management</span>
            </div>
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                 <div>
                    <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-slate-900">Grading Bands</h1>
                    <p class="text-slate-500 text-xs sm:text-sm italic">Define result derivation tiers for the session.</p>
                </div>
                <button class="bg-slate-900 text-white px-6 py-3 rounded-xl text-xs font-bold shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4 text-white/50"></i>
                    Add Tier
                </button>
            </div>
        </div>

        <!-- VALIDATION WARNINGS (MOBILE COMPACT) -->
        <div class="bg-red-50 border border-red-200 rounded-xl p-4 sm:p-5 flex items-start gap-3 shadow-sm">
            <i data-lucide="alert-circle" class="w-5 h-5 text-red-600 shrink-0 mt-0.5"></i>
            <div class="flex-1">
                <h3 class="text-xs font-extrabold text-red-900 uppercase tracking-widest mb-1 leading-tight">Policy Error</h3>
                <p class="text-[11px] text-red-700 leading-normal">Bands overlap for Grade B and C. Resolve thresholds to unblock results.</p>
            </div>
            <button class="text-red-400 hover:text-red-900 transition-colors">
                <i data-lucide="x" class="w-4 h-4 text-red-300"></i>
            </button>
        </div>

        <!-- TABLE/GRID EDITOR -->
        <div class="table-responsive">
            <table class="w-full border-separate border-spacing-0">
                <thead>
                    <tr>
                        <th class="w-20">Grade</th>
                        <th>Range</th>
                        <th>Remark / Derivation Label</th>
                        <th class="w-16"></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 sm:p-6">
                            <span class="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-emerald-100 text-emerald-800 font-bold text-lg font-heading">A</span>
                        </td>
                        <td class="p-4 sm:p-6">
                            <div class="flex items-center gap-1.5">
                                <input type="number" value="80" class="band-input">
                                <span class="text-slate-300">-</span>
                                <input type="number" value="100" class="band-input">
                            </div>
                        </td>
                        <td class="p-4 sm:p-6">
                            <input type="text" value="Outstanding Academic Results" class="w-full h-10 px-3 bg-slate-50 border border-slate-200 rounded-lg text-[11px] font-bold text-slate-700 focus:bg-white focus:border-blue-600 outline-none transition-all">
                        </td>
                        <td class="p-4 sm:p-6 text-right">
                             <button class="text-slate-300 p-2"><i data-lucide="more-vertical" class="w-4 h-4 text-slate-300"></i></button>
                        </td>
                    </tr>
                    <tr class="bg-red-50/10 hover:bg-slate-50 transition-colors">
                        <td class="p-4 sm:p-6">
                            <span class="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-blue-100 text-blue-800 font-bold text-lg font-heading">B</span>
                        </td>
                        <td class="p-4 sm:p-6">
                            <div class="flex items-center gap-1.5">
                                <input type="number" value="65" class="band-input error-border">
                                <span class="text-slate-300">-</span>
                                <input type="number" value="79" class="band-input">
                            </div>
                        </td>
                        <td class="p-4 sm:p-6">
                            <input type="text" value="Commendable Achievement" class="w-full h-10 px-3 bg-slate-50 border border-slate-200 rounded-lg text-[11px] font-bold text-slate-700 focus:bg-white focus:border-blue-600 outline-none transition-all">
                        </td>
                        <td class="p-4 sm:p-6 text-right">
                             <button class="text-slate-300 p-2"><i data-lucide="more-vertical" class="w-4 h-4 text-slate-300"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div class="p-4 sm:p-6 bg-slate-50 flex justify-center border-t border-slate-100">
                <button class="text-[9px] font-extrabold uppercase tracking-widest text-slate-400 hover:text-blue-600 transition-colors flex items-center gap-2">
                    <i data-lucide="plus" class="w-3 h-3 text-slate-300 transition-colors"></i>
                    Append Pass Tier
                </button>
            </div>
        </div>

    </main>

    <!-- MOBILE HUD FOR GLOBAL ACTIONS -->
    <div class="lg:hidden fixed bottom-0 left-0 right-0 p-4 border-t border-slate-200 bg-white/90 backdrop-blur-md flex items-center justify-end z-40">
        <button class="w-full bg-slate-900 text-white h-12 rounded-xl text-xs font-bold shadow-xl active:scale-95 transition-all">Commit Global Policy</button>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
